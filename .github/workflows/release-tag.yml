name: Release Tag

permissions:
  contents: write

on:
  push:
    branches: [main]

concurrency:
  group: release-tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-tag:
    name: Tag ${{ matrix.crate }} if its Cargo.toml version is untagged
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [jira, bitbucket, google-chat, atlassian-admin]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Tag if needed
        env:
          CRATE: ${{ matrix.crate }}
        run: |
          set -euo pipefail
          version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r --arg name "$CRATE" '.packages[] | select(.name == $name) | .version')
          tag="${CRATE}-v${version}"
          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "${tag} already exists, nothing to do."
            exit 0
          fi
          git tag "${tag}"
          git push origin "refs/tags/${tag}"

name: Release PR

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [main]

concurrency:
  group: release-pr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-pr:
    name: Compute bump and open/update release PR (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [jira, bitbucket, google-chat, atlassian-admin]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Install git-cliff and cargo-release
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff,cargo-release

      - name: Determine whether ${{ matrix.crate }} has releasable changes
        id: check
        env:
          CRATE: ${{ matrix.crate }}
        run: |
          set -euo pipefail
          latest_tag=$(git tag -l "${CRATE}-v*" | sort -V | tail -n1)
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          if [ -n "$latest_tag" ]; then
            range="${latest_tag}..HEAD"
          else
            range="HEAD"
          fi
          # Only feat/fix/perf/breaking-change commits actually warrant a
          # release â€” chore/ci/docs/refactor/style/test alone should not
          # (git-cliff itself has no config to exclude commit types from its
          # own bump computation, so this repo enforces it here instead).
          releasable=$(git log "$range" --pretty=format:"%s" -- "crates/${CRATE}/" \
            | grep -cE "^(feat|fix|perf)(\([^)]*\))?!?:" || true)
          breaking=$(git log "$range" --pretty=format:"%B" -- "crates/${CRATE}/" \
            | grep -c "BREAKING CHANGE" || true)
          if [ "$releasable" -eq 0 ] && [ "$breaking" -eq 0 ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        id: version
        if: steps.check.outputs.release == 'true'
        env:
          CRATE: ${{ matrix.crate }}
          LATEST_TAG: ${{ steps.check.outputs.latest_tag }}
        run: |
          set -euo pipefail
          if [ -z "$LATEST_TAG" ]; then
            # First release for this crate â€” nothing to bump from. git-cliff's
            # --bumped-version falls back to a bare "0.1.0" (its initial_tag
            # default) when no tag matches --tag-pattern, which then fails its
            # own validation against that same pattern. There's nothing to
            # bump here anyway: use the version already declared in Cargo.toml
            # as this crate's first release version (same source release-tag.yml
            # already uses to decide whether a tag is needed).
            version=$(cargo metadata --no-deps --format-version 1 \
              | jq -r --arg name "$CRATE" '.packages[] | select(.name == $name) | .version')
          else
            next=$(git-cliff --config cliff.toml --tag-pattern "^${CRATE}-v.*" --include-path "crates/${CRATE}/**" --bumped-version)
            version="${next#${CRATE}-v}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Skip â€” nothing to release
        if: steps.check.outputs.release != 'true'
        run: echo "No releasable changes for ${{ matrix.crate }}, skipping."

      - name: Create/reset local release branch
        if: steps.check.outputs.release == 'true'
        run: git checkout -B "release/${{ matrix.crate }}"

      - name: Configure git identity for the release commit
        if: steps.check.outputs.release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and update changelog via cargo-release
        if: steps.check.outputs.release == 'true'
        run: |
          cargo release "${{ steps.version.outputs.version }}" \
            -p "${{ matrix.crate }}" \
            --no-confirm --no-publish --no-tag --no-push \
            --execute

      - name: Push release branch
        if: steps.check.outputs.release == 'true'
        run: git push --force origin "HEAD:refs/heads/release/${{ matrix.crate }}"

      - name: Create or update release PR
        if: steps.check.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          crate="${{ matrix.crate }}"
          version="${{ steps.version.outputs.version }}"
          title="chore(${crate}): release v${version}"
          body="Automated release PR for **${crate} v${version}**, computed from conventional commits by git-cliff. Review the CHANGELOG.md diff and Cargo.toml bump, then merge â€” merging tags and builds binaries automatically."
          existing=$(gh pr list --head "release/${crate}" --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --title "$title" --body "$body"
          else
            gh pr create --head "release/${crate}" --base main --title "$title" --body "$body"
          fi
